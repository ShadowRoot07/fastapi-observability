name: Observability Stress Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Start Stack
        run: |
          # Forzamos el build para asegurar que los cambios del Nivel 1 y 2 estén presentes
          docker-compose up -d --build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Test Tools
        run: |
          pip install locust httpx

      - name: Wait for Services (30s)
        run: |
          # Esperamos a que el healthcheck de las apps y Prometheus esté listo
          sleep 30

      - name: Run Intelligent Stress Test (Locust)
        run: |
          # Ejecutamos Locust sin interfaz (headless) por 60 segundos
          # Esto generará tráfico en /, /io_task, /error_test, etc.
          locust -f locustfile.py --headless -u 10 -r 2 --run-time 60s -H http://localhost:8000

      - name: Verify Observability Endpoints
        run: |
          # Verificamos que Prometheus esté exponiendo métricas de la App-A
          curl -s http://localhost:8000/metrics | grep "fastapi_requests_total"
          # Verificamos que Loki esté respondiendo
          curl -s http://localhost:3100/ready

      - name: Inspect Logs for Correlated Traces
        if: always()
        run: |
          echo "=== APP-A LOGS (Buscando Trace IDs) ==="
          docker-compose logs app-a | tail -n 20
          
      - name: Stop Services
        if: always()
        run: docker-compose down

