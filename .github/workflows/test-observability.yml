name: Observability Stress Test

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Loki Logging Plugin
        run: |
          docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions
          docker plugin enable loki || true

      - name: Build and Start Stack
        run: |
          docker compose up -d --build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Test Tools
        run: |
          pip install locust httpx

      - name: Wait for Services (45s)
        run: |
          sleep 45

      - name: Run Intelligent Stress Test (Locust)
        run: |
          # Añadimos --exit-code-on-error 0 para que los 400/500 no rompan el build
          locust -f locustfile.py --headless -u 10 -r 2 --run-time 60s -H http://localhost:8000 --exit-code-on-error 0

      - name: Verify Observability Endpoints
        run: |
          curl -s http://localhost:8000/metrics | grep "fastapi"
          curl -s http://localhost:3100/ready

      - name: Inspect Logs for Correlated Traces
        if: always()
        run: |
          echo "=== APP-A LOGS (Buscando Trace IDs) ==="
          docker compose logs app-a --tail 20
          
      - name: Stop Services
        if: always()
        run: |
          docker compose down

